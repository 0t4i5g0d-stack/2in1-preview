name: Patch coin and hip drop mechanics

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-game-v2.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update mechanics
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          if s.count('ship+=cleared;')!=1:
              raise SystemExit(f'ship typo matches: {s.count("ship+=cleared;")}')
          s=s.replace('ship+=cleared;','ships+=cleared;',1)
          a=s.index('function resolveBlocks(){')
          b=s.index('function updateEntities',a)
          replacement=base64.b64decode('').decode('utf-8')
          s=s[:a]+replacement+s[b:]
          pairs=[
            ('const spd = e.type==="mush"?CFG.mushSpd : e.type==="foe"?CFG.foeSpd :',
             'const spd = e.type==="coin"?0 : e.type==="mush"?CFG.mushSpd : e.type==="foe"?CFG.foeSpd :'),
            ('if(e.type==="mush"){ grow(); e.alive=false; }\n      else if(e.type==="foe"){',
             'if(e.type==="mush"){ grow(); e.alive=false; }\n      else if(e.type==="coin"){ P.nextGold=true; e.alive=false; addFloat("GOLD NEXT",PX+PWD*0.5,PYY+PVH*0.3,GOLD); }\n      else if(e.type==="foe"){'),
            ('function drawFoe(x,yfoot,t){',
             base64.b64decode('').decode('utf-8')+'function drawFoe(x,yfoot,t){'),
            ('if(e.type==="mush") drawMush(e.x,e.y);\n    else if(e.type==="foe")',
             'if(e.type==="mush") drawMush(e.x,e.y);\n    else if(e.type==="coin") drawCoin(e.x,e.y,e.anim);\n    else if(e.type==="foe")')
          ]
          for old,new in pairs:
              if s.count(old)!=1:
                  raise SystemExit(f'expected one match for {old[:45]!r}, found {s.count(old)}')
              s=s.replace(old,new,1)
          p.write_text(s,encoding='utf-8')
          PY
          python - <<'PY'
          from pathlib import Path
          s=Path('index.html').read_text(encoding='utf-8')
          Path('/tmp/game.js').write_text(s.split('<script>',1)[1].split('</script>',1)[0],encoding='utf-8')
          PY
          node --check /tmp/game.js
          git diff --check
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add coin reward and hip-drop block breaking"
          git push
