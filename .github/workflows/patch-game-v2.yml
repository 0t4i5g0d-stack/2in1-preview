name: Patch gold line rewards

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-game-v2.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update line clearing
        run: |
          python - <<'PY'
          from pathlib import Path
          import base64
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          a=s.index('function lockPiece(){')
          b=s.index('function ensureSpawnRoom',a)
          replacement=base64.b64decode('').decode('utf-8')
          s=s[:a]+replacement+s[b:]
          p.write_text(s,encoding='utf-8')
          PY
          python - <<'PY'
          from pathlib import Path
          s=Path('index.html').read_text(encoding='utf-8')
          Path('/tmp/game.js').write_text(s.split('<script>',1)[1].split('</script>',1)[0],encoding='utf-8')
          PY
          node --check /tmp/game.js
          git diff --check
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add per-line gold time bonuses"
          git push
