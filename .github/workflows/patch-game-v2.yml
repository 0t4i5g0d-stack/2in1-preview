name: Patch line rewards

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/patch-game-v2.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update rewards
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          old='addLine:{1:3,2:6,3:10,4:15}'
          new='addLine:{1:5,2:10,3:15,4:20}'
          if s.count(old)!=1:
              raise SystemExit(f'expected one match, found {s.count(old)}')
          p.write_text(s.replace(old,new,1),encoding='utf-8')
          PY
          git diff --check
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Update line clear rewards"
          git push
