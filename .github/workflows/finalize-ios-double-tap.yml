name: Finalize iOS double-tap guard

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/finalize-ios-double-tap.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Add double-tap selection guard
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '''for(const type of ["contextmenu","selectstart","dragstart","dblclick"]){
            document.addEventListener(type,event=>event.preventDefault(),{capture:true,passive:false});
          }
          '''
          addition = marker + '''document.addEventListener("touchend",event=>{
            if(event.target instanceof Element && event.target.closest("#stage")) event.preventDefault();
          },{capture:true,passive:false});
          '''

          if 'document.addEventListener("touchend",event=>' not in text:
              if text.count(marker) != 1:
                  raise SystemExit(f'expected one insertion point, found {text.count(marker)}')
              text = text.replace(marker, addition, 1)

          path.write_text(text, encoding='utf-8')
          PY

          python - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          if 'document.addEventListener("touchend",event=>' not in html:
              raise SystemExit('double-tap guard missing')
          script = html.split('<script>',1)[1].split('</script>',1)[0]
          Path('/tmp/index.js').write_text(script, encoding='utf-8')
          PY

          node --check /tmp/index.js
          git diff --check

      - name: Commit official version and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git rm .github/workflows/finalize-ios-double-tap.yml
          git commit -m "Prevent iOS double-tap selection"
          git push origin HEAD:main
