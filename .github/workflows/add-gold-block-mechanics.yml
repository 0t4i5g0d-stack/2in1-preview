name: Add gold block mechanics

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/add-gold-block-mechanics.yml

permissions:
  contents: write

jobs:
  patch-game:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Update game mechanics
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          s = path.read_text(encoding="utf-8")

          def replace_once(old, new, label):
              global s
              count = s.count(old)
              if count != 1:
                  raise SystemExit(f"{label}: expected 1 match, found {count}")
              s = s.replace(old, new, 1)

          replace_once(
              '  addLock:1, addLine:{1:3,2:6,3:10,4:15},',
              '  addLock:1, addLine:{1:5,2:10,3:15,4:20},',
              'line rewards'
          )

          replace_once(
              'const PCOL={I:"#3cbcfc",O:"#f8d800",T:"#b83ce8",S:"#38d038",Z:"#f83c3c",J:"#3858f8",L:"#f89838"};',
              'const PCOL={I:"#3cbcfc",O:"#f8d800",T:"#b83ce8",S:"#38d038",Z:"#f83c3c",J:"#3858f8",L:"#f89838"};\nconst GOLD="#ffd700";',
              'gold color'
          )

          replace_once(
              '  L.blocks.push({col:58,row:GROUND-3,used:false,item:"mush"});',
              '  L.blocks.push({col:58,row:GROUND-3,used:false,item:"mush"});\n  L.blocks.push({col:39,row:GROUND-3,used:false,item:"coin"});',
              'coin box'
          )

          replace_once(
              '  P={grid:Array.from({length:CFG.rowsBase},()=>emptyRow()),bag:newBag(),next:null,cur:null,dropT:0,intakeT:0,hdir:0,das:0};',
              '  P={grid:Array.from({length:CFG.rowsBase},()=>emptyRow()),bag:newBag(),next:null,nextGold:false,cur:null,dropT:0,intakeT:0,hdir:0,das:0};',
              'puzzle state'
          )

          replace_once(
              '  P.cur={t,rot:0,col:((PW-w)/2)|0,row:0}; P.dropT=0; P.hdir=0;',
              '  P.cur={t,rot:0,col:((PW-w)/2)|0,row:0,gold:P.nextGold}; P.nextGold=false; P.dropT=0; P.hdir=0;',
              'gold next piece'
          )

          old_lock = '''function lockPiece(){
  for(const [c,r] of pieceCells(P.cur,P.cur.rot))
    if(r>=0&&r<rows()&&c>=0&&c<PW) P.grid[r][c]=PCOL[P.cur.t];
  addTime(CFG.addLock,"+"+CFG.addLock);
  const cleared=clearLines();
  if(cleared>0){ ships+=cleared; const add=CFG.addLine[cleared]||CFG.addLine[4];
    addTime(add,(cleared>=4?"TETRIS! +":cleared+"LINE +")+add); }
  P.cur=null; P.intakeT=CFG.intake;
}
function clearLines(){ let n=0;
  for(let r=rows()-1;r>=0;r--){ if(P.grid[r].every(x=>x)){ P.grid.splice(r,1); P.grid.unshift(emptyRow()); n++; r++; } } return n; }'''
          new_lock = '''function lockPiece(){
  const color=P.cur.gold?GOLD:PCOL[P.cur.t];
  for(const [c,r] of pieceCells(P.cur,P.cur.rot))
    if(r>=0&&r<rows()&&c>=0&&c<PW) P.grid[r][c]=color;
  addTime(CFG.addLock,"+"+CFG.addLock);
  const result=clearLines(), cleared=result.count;
  if(cleared>0){
    ships+=cleared;
    const base=CFG.addLine[cleared]||CFG.addLine[4];
    const goldBonus=result.gold*CFG.addLine[1];
    const add=base+goldBonus;
    const goldLabel=result.gold>0?"  GOLD x"+result.gold:"";
    addTime(add,(cleared>=4?"TETRIS!":cleared+"LINE")+goldLabel+" +"+add);
  }
  P.cur=null; P.intakeT=CFG.intake;
}
function clearLines(){ let n=0,gold=0;
  for(let r=rows()-1;r>=0;r--){
    if(P.grid[r].every(x=>x)){
      if(P.grid[r].some(x=>x===GOLD)) gold++;
      P.grid.splice(r,1); P.grid.unshift(emptyRow()); n++; r++;
    }
  }
  return {count:n,gold};
}'''
          replace_once(old_lock, new_lock, 'line clear logic')

          old_resolve = '''function resolveBlocks(){
  const pl=A.x-A.w/2, pr=A.x+A.w/2, pt=A.y-A.h, pb=A.y;
  for(let i=L.blocks.length-1;i>=0;i--){
    const b=L.blocks[i], q=blockRect(b);
    const bx=q.x, by=q.y, br=q.r, bb=q.b;
    if(pr<=bx||pl>=br||pb<=by||pt>=bb) continue;
    const ox=Math.min(pr,br)-Math.max(pl,bx), oy=Math.min(pb,bb)-Math.max(pt,by);
    if(ox<oy){ if(A.x<q.cx) A.x-=ox; else A.x+=ox; continue; }
    if(A.y-A.h/2 < by+TILE/2){                 // 上に乗る＝着地
      if(b.type==="brick" && A.hipDropping){    // ヒップドロップで踏み割る
        L.blocks.splice(i,1);
        A.hipDropping=false; A.hipLanded=true;  // 割って通過（下の地面へ落ちる）
      } else {
        A.y=by; A.vy=0; A.onGround=true;
        if(A.hipDropping){ A.hipDropping=false; A.hipLanded=true; }
      }
    } else {                                    // 下から叩く
      A.y=bb+A.h; A.vy=0;
      if(b.type!=="brick" && !b.used){ b.used=true; if(b.item==="mush")
        ents.push({type:"mush",x:q.cx,y:by,vy:-160,dir:1,alive:true,anim:0}); }
    }
  }
}'''
          new_resolve = '''function releaseBlockItem(b,q){
  if(b.used||!b.item) return;
  b.used=true;
  if(b.item==="mush") ents.push({type:"mush",x:q.cx,y:q.y,vy:-160,dir:1,alive:true,anim:0});
  else if(b.item==="coin") ents.push({type:"coin",x:q.cx,y:q.y,vy:-260,dir:0,alive:true,anim:0});
}
function resolveBlocks(){
  const pl=A.x-A.w/2, pr=A.x+A.w/2, pt=A.y-A.h, pb=A.y;
  for(let i=L.blocks.length-1;i>=0;i--){
    const b=L.blocks[i], q=blockRect(b);
    const bx=q.x, by=q.y, br=q.r, bb=q.b;
    if(pr<=bx||pl>=br||pb<=by||pt>=bb) continue;
    const ox=Math.min(pr,br)-Math.max(pl,bx), oy=Math.min(pb,bb)-Math.max(pt,by);
    if(ox<oy){ if(A.x<q.cx) A.x-=ox; else A.x+=ox; continue; }
    if(A.y-A.h/2 < by+TILE/2){                 // 上に乗る＝着地
      if(A.hipDropping){                        // ヒップドロップなら空中ブロックを種類問わず破壊
        releaseBlockItem(b,q);
        L.blocks.splice(i,1);
        A.hipDropping=false; A.hipLanded=true;  // 割って通過（下の地面へ落ちる）
      } else {
        A.y=by; A.vy=0; A.onGround=true;
      }
    } else {                                    // 下から叩く
      A.y=bb+A.h; A.vy=0;
      if(b.type!=="brick") releaseBlockItem(b,q);
    }
  }
}'''
          replace_once(old_resolve, new_resolve, 'block breaking and items')

          replace_once(
              '    const spd = e.type==="mush"?CFG.mushSpd : e.type==="foe"?CFG.foeSpd :\n                e.state==="shellMoving"?CFG.shellSpeed : e.state==="shell"?0 : CFG.nokSpd;',
              '    const spd = e.type==="coin"?0 : e.type==="mush"?CFG.mushSpd : e.type==="foe"?CFG.foeSpd :\n                e.state==="shellMoving"?CFG.shellSpeed : e.state==="shell"?0 : CFG.nokSpd;',
              'coin movement'
          )

          replace_once(
              '      if(e.type==="mush"){ grow(); e.alive=false; }\n      else if(e.type==="foe"){',
              '      if(e.type==="mush"){ grow(); e.alive=false; }\n      else if(e.type==="coin"){ P.nextGold=true; e.alive=false; addFloat("GOLD NEXT",PX+PWD*0.5,PYY+PVH*0.3,GOLD); }\n      else if(e.type==="foe"){',
              'coin collection'
          )

          replace_once(
              '''function drawFoe(x,yfoot,t){ const s=TILE*0.7, wob=Math.sin(t*8)*2;''',
              '''function drawCoin(x,yfoot,t){ const s=TILE*0.5, w=Math.max(4,Math.abs(Math.cos(t*8))*s);
  g.fillStyle=GOLD; g.beginPath(); g.ellipse(x,yfoot-s*0.5,w*0.5,s*0.5,0,0,7); g.fill();
  g.strokeStyle="#9a6a00"; g.lineWidth=2; g.stroke();
  g.fillStyle="rgba(255,255,255,.65)"; g.fillRect(x-w*0.18,yfoot-s*0.78,Math.max(2,w*0.12),s*0.5); }
function drawFoe(x,yfoot,t){ const s=TILE*0.7, wob=Math.sin(t*8)*2;''',
              'coin drawing'
          )

          replace_once(
              '    if(e.type==="mush") drawMush(e.x,e.y);\n    else if(e.type==="foe") drawFoe(e.x,e.y,e.anim);',
              '    if(e.type==="mush") drawMush(e.x,e.y);\n    else if(e.type==="coin") drawCoin(e.x,e.y,e.anim);\n    else if(e.type==="foe") drawFoe(e.x,e.y,e.anim);',
              'render coin'
          )

          replace_once(
              '  if(P.cur){ for(const [c,r] of pieceCells(P.cur,P.cur.rot)){ if(r<0)continue; block3d(ox+c*cell,oy+r*cell,cell,PCOL[P.cur.t]); } }',
              '  if(P.cur){ const curColor=P.cur.gold?GOLD:PCOL[P.cur.t]; for(const [c,r] of pieceCells(P.cur,P.cur.rot)){ if(r<0)continue; block3d(ox+c*cell,oy+r*cell,cell,curColor); } }',
              'render current gold piece'
          )

          replace_once(
              '  if(P.next){ const s=Math.min(14,cell*0.7); for(const [c,r] of SHAPES[P.next][0]) block3d(PX+6+c*s,PYY+20+r*s,s-1,PCOL[P.next]); }',
              '  if(P.next){ const s=Math.min(14,cell*0.7), nextColor=P.nextGold?GOLD:PCOL[P.next]; for(const [c,r] of SHAPES[P.next][0]) block3d(PX+6+c*s,PYY+20+r*s,s-1,nextColor); }',
              'render next gold piece'
          )

          path.write_text(s, encoding="utf-8")
          PY

          python - <<'PY'
          from pathlib import Path
          s=Path('index.html').read_text(encoding='utf-8')
          script=s.split('<script>',1)[1].split('</script>',1)[0]
          Path('/tmp/game.js').write_text(script,encoding='utf-8')
          PY
          node --check /tmp/game.js
          git diff --check

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add gold tetromino bonus and hip-drop block breaking"
          git push
