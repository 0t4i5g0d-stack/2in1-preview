name: Publish touch preview trigger

on:
  push:
    branches: [main]
    paths:
      - .touch-preview-trigger

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update draft PR branch for iOS double-tap selection
        run: |
          git fetch origin codex/index.html:refs/remotes/origin/codex/index.html
          git checkout -B codex/index.html refs/remotes/origin/codex/index.html
          python - <<'PY'
          from pathlib import Path
          path = Path('index.html')
          text = path.read_text(encoding='utf-8')
          marker = '''for(const type of ["contextmenu","selectstart","dragstart","dblclick"]){
  document.addEventListener(type,event=>event.preventDefault(),{capture:true,passive:false});
}
'''
          addition = marker + '''document.addEventListener("touchend",event=>{
  if(event.target instanceof Element && event.target.closest("#stage")) event.preventDefault();
},{capture:true,passive:false});
'''
          if 'document.addEventListener("touchend",event=>' not in text:
              if text.count(marker) != 1:
                  raise SystemExit(f'double-tap anchor mismatch: {text.count(marker)}')
              text = text.replace(marker, addition, 1)
          path.write_text(text, encoding='utf-8')
          PY
          python - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          script = html.split('<script>',1)[1].split('</script>',1)[0]
          Path('/tmp/pr-preview.js').write_text(script, encoding='utf-8')
          if 'document.addEventListener("touchend",event=>' not in html:
              raise SystemExit('touchend double-tap guard missing')
          PY
          node --check /tmp/pr-preview.js
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ! git diff --quiet; then
            git add index.html
            git commit -m "Prevent iOS double-tap selection"
            git push origin HEAD:codex/index.html
          fi
          echo "PREVIEW_SHA=$(git rev-parse HEAD)" >> "$GITHUB_ENV"

      - name: Publish standalone Pages preview without changing index.html
        run: |
          git fetch origin main:refs/remotes/origin/main
          git checkout -B main refs/remotes/origin/main
          git show "$PREVIEW_SHA:index.html" > touch-preview.html
          python - <<'PY'
          from pathlib import Path
          path = Path('touch-preview.html')
          text = path.read_text(encoding='utf-8')
          text = text.replace('<title>2 IN 1</title>', '<title>2 IN 1 TOUCH PREVIEW</title>', 1)
          text = text.replace('<head>', '<head>\n<meta name="robots" content="noindex,nofollow">', 1)
          path.write_text(text, encoding='utf-8')
          PY
          python - <<'PY'
          from pathlib import Path
          html = Path('touch-preview.html').read_text(encoding='utf-8')
          script = html.split('<script>',1)[1].split('</script>',1)[0]
          Path('/tmp/touch-preview.js').write_text(script, encoding='utf-8')
          if 'document.addEventListener("touchend",event=>' not in html:
              raise SystemExit('published preview lacks double-tap guard')
          PY
          node --check /tmp/touch-preview.js
          git diff --check
          git add touch-preview.html
          git rm -f .touch-preview-trigger \
            .github/workflows/publish-touch-preview.yml \
            .github/workflows/publish-touch-preview-issue.yml \
            .github/workflows/publish-touch-preview-trigger.yml
          git commit -m "Add iPhone touch controls preview"
          git push origin HEAD:main
