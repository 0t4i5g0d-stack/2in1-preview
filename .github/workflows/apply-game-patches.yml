name: Apply game patches

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply patch script
        run: python scripts/apply_game_patches.py
      - name: Check JavaScript syntax
        run: |
          python - <<'PY'
          from pathlib import Path
          html=Path('index.html').read_text(encoding='utf-8')
          js=html.split('<script>',1)[1].split('</script>',1)[0]
          Path('/tmp/game.js').write_text(js,encoding='utf-8')
          PY
          node --check /tmp/game.js
          git diff --check
      - name: Commit changes
        run: |
          if git diff --quiet; then
            echo "No game changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add star mechanics, gold shine, and rule panel"
          git push
