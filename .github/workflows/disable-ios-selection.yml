name: Disable iOS selection callout

on:
  push:
    branches: [main]
    paths:
      - .github/workflows/disable-ios-selection.yml

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Prevent selection and long-press callouts
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          text = path.read_text(encoding="utf-8")

          old_css = '''  html,body{height:100%;background:#000;overflow:hidden;font-family:"Courier New",monospace}
  #stage{position:fixed;inset:0;width:100vw;height:100dvh;background:#000}
  canvas{display:block;width:100%;height:100%;touch-action:none;image-rendering:pixelated}'''
          new_css = '''  html,body{height:100%;background:#000;overflow:hidden;font-family:"Courier New",monospace;overscroll-behavior:none}
  html,body,#stage,canvas{-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  #stage{position:fixed;inset:0;width:100vw;height:100dvh;background:#000}
  canvas{display:block;width:100%;height:100%;touch-action:none;image-rendering:pixelated;-webkit-user-drag:none}'''

          if text.count(old_css) != 1:
              raise SystemExit(f"CSS anchor mismatch: {text.count(old_css)}")
          text = text.replace(old_css, new_css, 1)

          old_js = 'addEventListener("resize",fit); addEventListener("orientationchange",()=>setTimeout(fit,120));'
          new_js = '''addEventListener("resize",fit); addEventListener("orientationchange",()=>setTimeout(fit,120));
for(const type of ["contextmenu","selectstart","dragstart"]){
  cv.addEventListener(type,e=>e.preventDefault(),{passive:false});
}'''

          if text.count(old_js) != 1:
              raise SystemExit(f"JS anchor mismatch: {text.count(old_js)}")
          text = text.replace(old_js, new_js, 1)

          path.write_text(text, encoding="utf-8")
          PY

          python - <<'PY'
          from pathlib import Path
          html = Path("index.html").read_text(encoding="utf-8")
          script = html.split("<script>",1)[1].split("</script>",1)[0]
          Path("/tmp/game.js").write_text(script, encoding="utf-8")
          PY
          node --check /tmp/game.js
          git diff --check

      - name: Commit patch and remove temporary workflow
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git rm .github/workflows/disable-ios-selection.yml
          git commit -m "Prevent iOS long-press selection in game"
          git push

# Triggered after creation so GitHub recognizes the workflow on the default branch.
