<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>2 IN 1</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;background:#000;overflow:hidden;font-family:"Courier New",monospace;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;overscroll-behavior:none}
  #stage{position:fixed;inset:0;width:100vw;height:100dvh;background:#000;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  canvas{display:block;width:100%;height:100%;touch-action:none;image-rendering:pixelated;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;-webkit-user-drag:none}
  #touch-controls{position:absolute;right:0;bottom:0;left:0;display:none;height:var(--touch-controls-height);align-items:center;justify-content:space-around;background:#0a0a0a;border-top:1px solid #222;touch-action:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  .touch-enabled #touch-controls{display:flex}
  .control-group{display:flex;gap:clamp(18px,5vw,52px)}
  .control-button{position:relative;width:clamp(64px,16vw,126px);aspect-ratio:1;border:2px solid #fff;border-radius:50%;background:#2a2a2a;touch-action:none;-webkit-appearance:none;appearance:none;-webkit-user-select:none;user-select:none;-webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  .control-button::before{position:absolute;top:50%;left:50%;width:42%;height:46%;content:"";background:#fff;clip-path:polygon(100% 0,0 50%,100% 100%);transform:translate(-50%,-50%)}
  .control-button[data-key="right"]::before{transform:translate(-50%,-50%) rotate(180deg)}
  .control-button[data-key="up"]::before{transform:translate(-50%,-50%) rotate(90deg)}
  .control-button[data-key="down"]::before{transform:translate(-50%,-50%) rotate(-90deg)}
  .control-button.is-held{background:#f8d800}
  .control-button.is-held::before{background:#000}
</style>
</head>
<body>
<div id="stage"><canvas id="c"></canvas><div id="touch-controls" aria-label="ゲーム操作">
  <div class="control-group"><button class="control-button" type="button" data-key="left" aria-label="左へ移動"></button><button class="control-button" type="button" data-key="right" aria-label="右へ移動"></button></div>
  <div class="control-group"><button class="control-button" type="button" data-key="up" aria-label="ジャンプ・回転"></button><button class="control-button" type="button" data-key="down" aria-label="しゃがむ・ドロップ"></button></div>
</div></div>
<script>
"use strict";
const cv=document.getElementById("c"), g=cv.getContext("2d");
const touchControls=document.getElementById("touch-controls"), controlButtons=[...touchControls.querySelectorAll("[data-key]")];
for(const type of ["contextmenu","selectstart","dragstart","dblclick"]){
  document.addEventListener(type,event=>event.preventDefault(),{capture:true,passive:false});
}
let W=960,H=640,renderDpr=1;
const IS_TOUCH = matchMedia("(hover: none), (pointer: coarse)").matches || ("ontouchstart" in window);
document.body.classList.toggle("touch-enabled",IS_TOUCH);
function fit(){ const r=cv.getBoundingClientRect(); renderDpr=Math.min(2,window.devicePixelRatio||1);
  cv.width=Math.max(320,Math.round(r.width*renderDpr)); cv.height=Math.max(320,Math.round(r.height*renderDpr));
  W=cv.width; H=cv.height; g.imageSmoothingEnabled=false; }
addEventListener("resize",fit); addEventListener("orientationchange",()=>setTimeout(fit,120));

/* ===== CONFIG ===== */
const CFG={ timeStart:20, timeCap:60, timeIdeal:40,
  addLock:1, addLine:{1:5,2:10,3:15,4:20},
  penPit:5, invuln:1.4,
  moveSpd:200, jumpV:650, grav:1500, worldBottom:640, stompBounce:300,
  mushSpd:70, starSpd:95, foeSpd:55, nokSpd:45, shellSpeed:260, hipDropSpeed:780,
  starDuration:10, starGrace:5, starExtraRows:8,
  cols:10, rowsBase:20, expStep:4, expMax:3,
  fallInt:0.8, softInt:0.05, intake:0.6, dasDelay:0.16, dasRepeat:0.10 };
const TILE=44;
const BLOCK=TILE;
const PW=CFG.cols;
const ACTION_WORLD_H=(8+2)*TILE;

const SKY="#5c94fc", BRICK="#c84c0c", MORTAR="#2a1204", GRND="#e07818", GRND_D="#a04c08";
const PCOL={I:"#3cbcfc",O:"#f8d800",T:"#b83ce8",S:"#38d038",Z:"#f83c3c",J:"#3858f8",L:"#f89838"};
const GOLD="#ffd700";

/* ===== INPUT ===== */
const keyH={left:false,right:false,up:false,down:false};
const touchH={left:false,right:false,up:false,down:false};
const held={left:false,right:false,up:false,down:false};
const prev={left:false,right:false,up:false,down:false};
let frame={left:false,right:false,up:false,down:false,pL:false,pR:false,pU:false,pD:false};
function sampleInput(){
  held.left=keyH.left||touchH.left; held.right=keyH.right||touchH.right;
  held.up=keyH.up||touchH.up; held.down=keyH.down||touchH.down;
  frame={left:held.left,right:held.right,up:held.up,down:held.down,
    pL:held.left&&!prev.left,pR:held.right&&!prev.right,pU:held.up&&!prev.up,pD:held.down&&!prev.down};
  prev.left=held.left;prev.right=held.right;prev.up=held.up;prev.down=held.down;
}
const KEY={ArrowLeft:"left",ArrowRight:"right",ArrowUp:"up",ArrowDown:"down",
  a:"left",d:"right",w:"up",s:"down",A:"left",D:"right",W:"up",S:"down"};
addEventListener("keydown",e=>{const k=KEY[e.key];if(k){keyH[k]=true;e.preventDefault();}
  if(state!=="play"&&(k||e.key===" "||e.key==="Enter"))startOrRestart();},{passive:false});
addEventListener("keyup",e=>{const k=KEY[e.key];if(k){keyH[k]=false;e.preventDefault();}},{passive:false});
const activePointers=new Map();
function toCanvas(e){const r=cv.getBoundingClientRect();
  return {x:(e.clientX-r.left)*(cv.width/r.width),y:(e.clientY-r.top)*(cv.height/r.height)};}
function hitButton(x,y){ if(!BTN)return null;
  for(const key of ["left","right","up","down"]){const b=BTN[key];
    if((x-b.x)**2+(y-b.y)**2<=b.r*b.r) return key;} return null;}
function recompTouch(){ touchH.left=touchH.right=touchH.up=touchH.down=false;
  for(const k of activePointers.values()) touchH[k]=true;
  for(const button of controlButtons) button.classList.toggle("is-held",touchH[button.dataset.key]); }
function controlKeyAt(x,y){ const target=document.elementFromPoint(x,y); const button=target&&target.closest(".control-button");
  return button&&touchControls.contains(button)?button.dataset.key:null; }
touchControls.addEventListener("pointerdown",e=>{ const key=controlKeyAt(e.clientX,e.clientY); if(!key)return;
  e.preventDefault(); activePointers.set(e.pointerId,key); recompTouch(); try{touchControls.setPointerCapture(e.pointerId);}catch(_){} },{passive:false});
touchControls.addEventListener("pointermove",e=>{ if(!activePointers.has(e.pointerId))return;
  const key=controlKeyAt(e.clientX,e.clientY); if(key)activePointers.set(e.pointerId,key); else activePointers.delete(e.pointerId); recompTouch(); },{passive:false});
const releaseControl=e=>{ if(activePointers.delete(e.pointerId))recompTouch(); };
touchControls.addEventListener("pointerup",releaseControl); touchControls.addEventListener("pointercancel",releaseControl);
cv.addEventListener("pointerdown",e=>{ e.preventDefault();
  if(state!=="play"){ activePointers.clear(); recompTouch(); startOrRestart(); return; }
  const p=toCanvas(e),k=hitButton(p.x,p.y);
  if(k){ activePointers.set(e.pointerId,k); recompTouch(); try{cv.setPointerCapture(e.pointerId);}catch(_){} }},{passive:false});
cv.addEventListener("pointermove",e=>{ if(!activePointers.has(e.pointerId))return;
  const p=toCanvas(e),k=hitButton(p.x,p.y);
  if(k)activePointers.set(e.pointerId,k); else activePointers.delete(e.pointerId); recompTouch();},{passive:false});
const rel=e=>{ if(activePointers.delete(e.pointerId)) recompTouch(); };
cv.addEventListener("pointerup",rel); cv.addEventListener("pointercancel",rel); cv.addEventListener("pointerleave",rel);

/* ===== LAYOUT ===== */
let TBx,TBy,TBw,TBh,AX,AY,AW,AVH,PX,PYY,PWD,PVH,ECx,ECy,ECw,ECh,CTx,CTy,CTw,CTh,BTN=null;
function layout(){
  const portrait=H>=W*1.02;
  CTh=IS_TOUCH?(portrait?Math.min(H*0.20,260):Math.min(H*0.26,190)):0;
  CTx=0;CTy=H-CTh;CTw=W;
  touchControls.style.setProperty("--touch-controls-height",(CTh/renderDpr)+"px");
  const availH=H-CTh, TB=Math.max(38,Math.min(54,availH*0.085));
  const ECHOH=portrait?Math.max(28,Math.min(44,availH*0.065)):46;
  if(portrait){ const bodyH=availH-TB-ECHOH;
    AX=0;AY=0;AW=W;AVH=bodyH*0.46; TBx=0;TBy=AY+AVH;TBw=W;TBh=TB;
    PX=0;PYY=TBy+TB;PWD=W;PVH=availH-PYY-ECHOH; ECx=0;ECy=availH-ECHOH;ECw=W;ECh=ECHOH;
  } else { TBx=0;TBy=0;TBw=W;TBh=TB;
    const bodyTop=TB,bodyBot=availH-ECHOH,bodyH=bodyBot-bodyTop;
    AX=0;AY=bodyTop;AW=Math.round(W*0.64);AVH=bodyH; PX=AW+8;PYY=bodyTop;PWD=W-PX-8;PVH=bodyH;
    ECx=0;ECy=bodyBot;ECw=W;ECh=ECHOH; }
  BTN=null;
}

/* ===== LEVEL ===== */
const GH=CFG.worldBottom, GROUND=8, CROUCH_TUNNEL_CEILING=GROUND-1.35;
function buildLevel(){
  const L={len:96,ground:[],ceil:[],item:[],blocks:[],foes:[],nok:[]};
  for(let c=0;c<L.len;c++){L.ground[c]=GROUND;L.ceil[c]=null;L.item[c]=null;}
  const pit=(a,b)=>{for(let c=a;c<=b;c++)L.ground[c]=null;};
  const ceil=(a,b,r)=>{for(let c=a;c<=b;c++)L.ceil[c]=r;};
  L.blocks.push({col:9,row:GROUND-3,used:false,item:"mush"});
  L.blocks.push({col:58,row:GROUND-3,used:false,item:"star"});
  L.blocks.push({col:39,row:GROUND-3,used:false,item:"coin"});
  L.blocks.push({col:12,row:GROUND-3,type:"brick"});
  L.blocks.push({col:72,row:GROUND-3,type:"brick"});
  pit(16,17); ceil(26,31,CROUCH_TUNNEL_CEILING);
  L.item[34]="cp"; pit(45,45);
  L.foes=[22,36,52,68];
  L.nok=[6,42,84];
  L.item[90]="goal"; L.goalCol=90;
  return L;
}

/* ===== PUZZLE ===== */
const SHAPES={
  I:[[[0,1],[1,1],[2,1],[3,1]],[[2,0],[2,1],[2,2],[2,3]]],
  O:[[[1,0],[2,0],[1,1],[2,1]]],
  T:[[[1,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[2,1],[1,2]],[[0,1],[1,1],[2,1],[1,2]],[[1,0],[0,1],[1,1],[1,2]]],
  S:[[[1,0],[2,0],[0,1],[1,1]],[[1,0],[1,1],[2,1],[2,2]]],
  Z:[[[0,0],[1,0],[1,1],[2,1]],[[2,0],[1,1],[2,1],[1,2]]],
  J:[[[0,0],[0,1],[1,1],[2,1]],[[1,0],[2,0],[1,1],[1,2]],[[0,1],[1,1],[2,1],[2,2]],[[1,0],[1,1],[0,2],[1,2]]],
  L:[[[2,0],[0,1],[1,1],[2,1]],[[1,0],[1,1],[1,2],[2,2]],[[0,1],[1,1],[2,1],[0,2]],[[0,0],[1,0],[1,1],[1,2]]],
};
const TYPES=["I","O","T","S","Z","J","L"];
function newBag(){const b=[...TYPES];for(let i=b.length-1;i>0;i--){const j=Math.random()*(i+1)|0;[b[i],b[j]]=[b[j],b[i]];}return b;}
function emptyRow(){return Array(PW).fill(null);}

/* ===== STATE ===== */
let state="title";
let L,P,A,timer,isBig,expandLevel,ents,floats,flash,elapsed,deaths,ships,hits,loseReason,anim=0;
let starTimer=0,starGraceTimer=0,starExtraRows=0;
function reset(){
  L=buildLevel(); timer=CFG.timeStart; isBig=false; expandLevel=0;
  starTimer=0; starGraceTimer=0; starExtraRows=0;
  elapsed=0;deaths=0;ships=0;hits=0;loseReason="";floats=[];flash=0; ents=[];
  A={x:2*TILE,y:GROUND*TILE,py:GROUND*TILE,vy:0,onGround:true,crouch:false,face:1,cpx:2*TILE,
     invuln:0,anim:0,w:TILE*0.62,h:TILE*0.78,hipDropping:false,hipLanded:false};
  for(const c of L.foes) ents.push({type:"foe",x:c*TILE+TILE/2,y:GROUND*TILE,vy:0,dir:-1,alive:true,anim:0});
  for(const c of L.nok) ents.push({type:"nok",state:"walk",x:c*TILE+TILE/2,y:GROUND*TILE,vy:0,dir:-1,alive:true,anim:0});
  P={grid:Array.from({length:CFG.rowsBase},()=>emptyRow()),bag:newBag(),next:null,nextGold:false,cur:null,dropT:0,intakeT:0,hdir:0,das:0};
  P.next=P.bag.pop(); spawnPiece();
}
function rows(){return P.grid.length;}
function spawnPiece(){
  const t=P.next; P.next=P.bag.length?P.bag.pop():(P.bag=newBag()).pop();
  const cells=SHAPES[t][0], w=Math.max(...cells.map(c=>c[0]))+1;
  P.cur={t,rot:0,col:((PW-w)/2)|0,row:0,gold:P.nextGold}; P.nextGold=false; P.dropT=0; P.hdir=0;
  let guard=0;
  while(collide(P.cur,0,0,P.cur.rot)&&(starTimer>0||starGraceTimer>0)&&guard++<CFG.starExtraRows){
    P.grid.unshift(emptyRow()); starExtraRows++; P.cur.row++;
  }
  if(collide(P.cur,0,0,P.cur.rot)) gameOver("積みあがってゲームオーバー");
}
function pieceCells(p,rot){return SHAPES[p.t][rot].map(([c,r])=>[p.col+c,p.row+r]);}
function collide(p,dc,dr,rot){
  for(const [c,r] of SHAPES[p.t][rot]){ const cc=p.col+c+dc, rr=p.row+r+dr;
    if(cc<0||cc>=PW||rr>=rows()) return true;
    if(rr>=0 && P.grid[rr][cc]) return true; } return false;
}
function lockPiece(){
  const color=P.cur.gold?GOLD:PCOL[P.cur.t];
  for(const [c,r] of pieceCells(P.cur,P.cur.rot))
    if(r>=0&&r<rows()&&c>=0&&c<PW) P.grid[r][c]=color;
  addTime(CFG.addLock,"+"+CFG.addLock);
  const result=clearLines(), cleared=result.count;
  if(cleared>0){
    ships+=cleared;
    const base=CFG.addLine[cleared]||CFG.addLine[4];
    const goldBonus=result.gold*CFG.addLine[1];
    const add=base+goldBonus;
    const goldLabel=result.gold>0?" GOLD x"+result.gold:"";
    addTime(add,(cleared>=4?"TETRIS!":cleared+"LINE")+goldLabel+" +"+add);
  }
  P.cur=null; P.intakeT=CFG.intake;
}
function clearLines(){ let n=0,gold=0;
  for(let r=rows()-1;r>=0;r--){
    if(P.grid[r].every(x=>x)){
      if(P.grid[r].some(x=>x===GOLD)) gold++;
      P.grid.splice(r,1); P.grid.unshift(emptyRow()); n++; r++;
    }
  }
  return {count:n,gold};
}
function ensureSpawnRoom(minEmpty){
  let hf=P.grid.findIndex(row=>row.some(x=>x));
  if(hf===-1) return;
  let guard=0;
  while(hf<minEmpty && guard++<rows()){
    P.grid.splice(hf,1); P.grid.unshift(emptyRow());
    hf=P.grid.findIndex(row=>row.some(x=>x)); if(hf===-1) break;
  }
}

/* ===== SIZE / COUPLING ===== */
function grow(){
  isBig=true;
  if(expandLevel<CFG.expMax){ expandLevel++;
    for(let i=0;i<CFG.expStep;i++) P.grid.unshift(emptyRow());
    if(P.cur) P.cur.row+=CFG.expStep;
    addFloat(expandLevel>1?("枠 ＋"+CFG.expStep+"段  x"+expandLevel):("BIG ＋"+CFG.expStep+"段"),PX+PWD*0.5,PYY+PVH*0.3,"#38d038"); flash=0.25;
  } else addFloat("MAX",PX+PWD*0.5,PYY+PVH*0.3,"#38d038");
}
function shrinkToSmall(){
  isBig=false; expandLevel=0;
  if(rows()>CFG.rowsBase) P.grid.splice(0, rows()-CFG.rowsBase);
  starTimer=0; starGraceTimer=0; starExtraRows=0;
  ensureSpawnRoom(2);
  P.cur=null; P.intakeT=CFG.intake;
  A.invuln=CFG.invuln; addFloat("SMALL 枠リセット",PX+PWD*0.5,PYY+PVH*0.3,"#f83c3c");
}
function applyDamage(){ if(starTimer>0||A.invuln>0)return;
  if(isBig) shrinkToSmall(); else gameOver("やられた"); hits++; }
function addTime(sec,label){ timer=Math.min(CFG.timeCap,timer+sec); flash=0.25;
  addFloat(label,PX+PWD*0.5,PYY+PVH*0.5,"#f8d800",true); }
function addFloat(text,x,y,color,toTimer){ floats.push({text,x,y,color,life:1.0,vy:-24,toTimer:!!toTimer}); }
function activateStar(){
  if(starExtraRows===0){
    starExtraRows=CFG.starExtraRows;
    for(let i=0;i<starExtraRows;i++) P.grid.unshift(emptyRow());
    if(P.cur) P.cur.row+=starExtraRows;
  }
  starTimer=CFG.starDuration; starGraceTimer=0;
  addFloat("STAR "+CFG.starDuration+"s",PX+PWD*0.5,PYY+PVH*0.30,"#fff176");
}
function starOverflowClear(){
  if(starExtraRows<=0)return true;
  const lockedClear=P.grid.slice(0,starExtraRows).every(row=>row.every(v=>!v));
  const activeClear=!P.cur||pieceCells(P.cur,P.cur.rot).every(([,r])=>r>=starExtraRows);
  return lockedClear&&activeClear;
}
function finishStarOverflow(){
  if(starExtraRows<=0)return;
  if(!starOverflowClear()){ gameOver("スター終了：枠外にブロック"); return; }
  P.grid.splice(0,starExtraRows);
  if(P.cur)P.cur.row-=starExtraRows;
  starExtraRows=0; starGraceTimer=0;
  addFloat("SAFE",PX+PWD*0.5,PYY+PVH*0.30,"#38d038");
}
function updateStar(dt){
  if(starTimer>0){
    starTimer=Math.max(0,starTimer-dt);
    if(starTimer===0){ starGraceTimer=CFG.starGrace; addFloat("枠内へ "+CFG.starGrace+"s",PX+PWD*0.5,PYY+PVH*0.30,"#f83c3c"); }
  } else if(starGraceTimer>0){
    if(starOverflowClear()){ finishStarOverflow(); return; }
    starGraceTimer=Math.max(0,starGraceTimer-dt);
    if(starGraceTimer===0)finishStarOverflow();
  }
}

function updatePuzzle(dt,f){
  if(!P.cur){ P.intakeT-=dt; if(P.intakeT<=0) spawnPiece(); return; }
  const dir=(f.right&&!f.left)?1:(f.left&&!f.right)?-1:0;
  if(dir===0){ P.hdir=0; P.das=0; }
  else if(P.hdir!==dir){ P.hdir=dir; P.das=CFG.dasDelay; if(!collide(P.cur,dir,0,P.cur.rot)) P.cur.col+=dir; }
  else { P.das-=dt; while(P.das<=0){ if(!collide(P.cur,dir,0,P.cur.rot)) P.cur.col+=dir; P.das+=CFG.dasRepeat; } }
  if(f.pU){ const nr=(P.cur.rot+1)%SHAPES[P.cur.t].length; if(!collide(P.cur,0,0,nr))P.cur.rot=nr; }
  P.dropT+=dt; const interval=f.down?CFG.softInt:CFG.fallInt;
  while(P.dropT>=interval){ P.dropT-=interval;
    if(!collide(P.cur,0,1,P.cur.rot)) P.cur.row++; else { lockPiece(); return; } }
}

/* ===== ACTION ===== */
function groundAt(px){const c=Math.floor(px/TILE); if(c<0||c>=L.len)return GROUND*TILE; return L.ground[c]===null?null:L.ground[c]*TILE;}
function ceilAt(px){const c=Math.floor(px/TILE); if(c<0||c>=L.len)return null; return L.ceil[c]===null?null:L.ceil[c]*TILE;}
function ceilingBottomAcross(left,right){
  const c0=Math.floor((left+0.01)/TILE), c1=Math.floor((right-0.01)/TILE);
  let bottom=null;
  for(let c=c0;c<=c1;c++){
    if(c<0||c>=L.len||L.ceil[c]===null) continue;
    const y=L.ceil[c]*TILE;
    bottom=bottom===null?y:Math.max(bottom,y);
  }
  return bottom;
}
function blockRect(b){
  const x=b.col*TILE+(TILE-BLOCK)/2, y=b.row*TILE;
  return {x,y,r:x+BLOCK,b:y+BLOCK,cx:x+BLOCK/2};
}
function canOccupyPlayerRect(x,footY,w,h){
  const left=x-w/2+0.5, right=x+w/2-0.5, top=footY-h, bottom=footY;
  const ceiling=ceilingBottomAcross(left,right);
  if(ceiling!==null && top<ceiling-0.01) return false;
  for(const b of L.blocks){
    const q=blockRect(b);
    if(right>q.x && left<q.r && bottom>q.y && top<q.b) return false;
  }
  return true;
}
function updateAction(dt,f){
  A.hipLanded=false;
  if(!A.onGround && f.pD && !A.hipDropping){ A.hipDropping=true; }
  const standH=isBig?TILE*1.72:TILE*0.88, crouchH=isBig?TILE*0.82:TILE*0.66;
  const w=isBig?TILE*0.82:TILE*0.64;
  const wantsCrouch=f.down||A.hipDropping;
  A.crouch=wantsCrouch || (!wantsCrouch && !canOccupyPlayerRect(A.x,A.y,w,standH));
  const h=A.crouch?crouchH:standH;
  A.w=w; A.h=h;
  let vx=0;
  if(!A.hipDropping){ if(f.right)vx+=CFG.moveSpd; if(f.left)vx-=CFG.moveSpd; }
  if(vx>0)A.face=1; else if(vx<0)A.face=-1; A.anim+=Math.abs(vx)*dt*0.02;
  const nx=Math.max(TILE*0.5,Math.min((L.len-0.5)*TILE,A.x+vx*dt));
  const nextCeiling=ceilingBottomAcross(nx-w/2+0.5,nx+w/2-0.5);
  const top=A.y-h;
  if(nextCeiling===null || top>=nextCeiling-0.01) A.x=nx;
  if(f.pU && A.onGround){ A.vy=-CFG.jumpV; A.onGround=false; A.hipDropping=false; }
  A.py=A.y;
  const prevTop=A.y-A.h;
  if(A.hipDropping){ A.vy=CFG.hipDropSpeed; A.y+=A.vy*dt; }
  else { A.vy+=CFG.grav*dt; A.y+=A.vy*dt; }
  if(A.vy<0){
    const ceiling=ceilingBottomAcross(A.x-A.w/2+0.5,A.x+A.w/2-0.5);
    const newTop=A.y-A.h;
    if(ceiling!==null && prevTop>=ceiling-0.01 && newTop<ceiling){
      A.y=ceiling+A.h; A.vy=0;
    }
  }
  const gy=groundAt(A.x);
  const wasHip=A.hipDropping;
  if(gy!==null && A.py<=gy && A.y>=gy && A.vy>=0){ A.y=gy; A.vy=0; A.onGround=true;
    if(wasHip){ A.hipDropping=false; A.hipLanded=true; }
  } else A.onGround=false;
  resolveBlocks();
  if(A.hipLanded){ addFloat("ドンッ",AX+AW*0.5,AY+56,"#fff"); }
  if(A.y>GH+40){ timer=Math.max(0,timer-CFG.penPit); deaths++;
    addFloat("-"+CFG.penPit+"s",AX+AW*0.5,AY+40,"#f83c3c");
    A.x=A.cpx; A.y=(groundAt(A.cpx)??GROUND*TILE); A.vy=0; A.invuln=1; A.hipDropping=false; }
  A.invuln=Math.max(0,A.invuln-dt);
  const col=Math.floor(A.x/TILE), it=L.item[col];
  if(it==="cp") A.cpx=col*TILE; else if(it==="goal") win();
}
function releaseBlockItem(b,q){
  if(b.used||!b.item) return;
  b.used=true;
  if(b.item==="mush") ents.push({type:"mush",x:q.cx,y:q.y,vy:-160,dir:1,alive:true,anim:0});
  else if(b.item==="coin") ents.push({type:"coin",x:q.cx,y:q.y,vy:-260,dir:0,alive:true,anim:0});
  else if(b.item==="star") ents.push({type:"star",x:q.cx,y:q.y,vy:-300,dir:1,alive:true,anim:0});
}
function resolveBlocks(){
  const pl=A.x-A.w/2, pr=A.x+A.w/2, pt=A.y-A.h, pb=A.y;
  for(let i=L.blocks.length-1;i>=0;i--){
    const b=L.blocks[i], q=blockRect(b);
    const bx=q.x, by=q.y, br=q.r, bb=q.b;
    if(pr<=bx||pl>=br||pb<=by||pt>=bb) continue;
    const ox=Math.min(pr,br)-Math.max(pl,bx), oy=Math.min(pb,bb)-Math.max(pt,by);
    if(ox<oy){ if(A.x<q.cx) A.x-=ox; else A.x+=ox; continue; }
    if(A.y-A.h/2 < by+TILE/2){
      if(A.hipDropping){
        releaseBlockItem(b,q);
        L.blocks.splice(i,1);
        A.hipDropping=false; A.hipLanded=true;
      } else {
        A.y=by; A.vy=0; A.onGround=true;
      }
    } else {
      A.y=bb+A.h; A.vy=0;
      if(b.type!=="brick") releaseBlockItem(b,q);
    }
  }
}
function updateEntities(dt){
  if(A.hipLanded){
    let defeated=0;
    for(const e of ents){ if(!e.alive)continue;
      if((e.type==="foe"||e.type==="nok") && Math.abs(e.x-A.x)<TILE*1.1 && Math.abs(e.y-A.y)<TILE*1.6){
        e.alive=false; defeated++; }
    }
    addFloat(defeated>0?"ヒップドロップ撃破！":"ドンッ",AX+AW*0.5,AY+56,defeated>0?"#f8d800":"#fff");
  }
  for(const e of ents){ if(!e.alive)continue;
    e.anim+=dt;
    const eW=TILE*0.7, eH=TILE*0.7;
    const spd = e.type==="coin"?0 : e.type==="star"?CFG.starSpd : e.type==="mush"?CFG.mushSpd : e.type==="foe"?CFG.foeSpd :
                e.state==="shellMoving"?CFG.shellSpeed : e.state==="shell"?0 : CFG.nokSpd;
    const avoidPit = !(e.type==="nok" && e.state==="shellMoving");
    e.vy+=CFG.grav*dt;
    if(spd>0){
      const nx=e.x+e.dir*spd*dt;
      if(avoidPit){ const ahead=groundAt(nx+e.dir*eW*0.5);
        if(ahead===null || nx<TILE*0.5 || nx>(L.len-0.5)*TILE) e.dir*=-1; else e.x=nx;
      } else { if(nx<TILE*0.5 || nx>(L.len-0.5)*TILE) e.dir*=-1; else e.x=nx; }
    }
    const prevY=e.y;
    e.y+=e.vy*dt;
    const gy=groundAt(e.x);
    if(gy!==null && prevY<=gy && e.y>=gy && e.vy>=0){ e.y=gy; e.vy=e.type==="star"?-300:0; }
    if(e.y>GH+40){ e.alive=false; continue; }
    if(Math.abs(e.x-A.x) < (eW/2+A.w/2) && (A.y> e.y-eH) && (A.y-A.h < e.y)){
      const stomp = A.vy>0 && A.py <= e.y-eH*0.4;
      if(e.type==="mush"){ grow(); e.alive=false; }
      else if(e.type==="coin"){ P.nextGold=true; e.alive=false; addFloat("GOLD NEXT",PX+PWD*0.5,PYY+PVH*0.3,GOLD); }
      else if(e.type==="star"){ activateStar(); e.alive=false; }
      else if(e.type==="foe"){
        if(starTimer>0){ e.alive=false; addFloat("STAR撃破",AX+AW*0.5,AY+44,"#fff176"); }
        else if(stomp){ e.alive=false; A.vy=-CFG.stompBounce; } else applyDamage();
      } else if(e.type==="nok"){
        if(starTimer>0){ e.alive=false; addFloat("STAR撃破",AX+AW*0.5,AY+44,"#fff176"); }
        else if(e.state==="walk"){
          if(stomp){ e.state="shell"; e.dir=0; A.vy=-CFG.stompBounce; } else applyDamage();
        } else if(e.state==="shell"){
          if(stomp){ e.state="shellMoving"; e.dir=(A.x<e.x)?1:-1; A.vy=-CFG.stompBounce; } else applyDamage();
        } else if(e.state==="shellMoving"){
          if(stomp){ e.state="shell"; e.dir=0; A.vy=-CFG.stompBounce; } else applyDamage();
        }
      }
    }
  }
  let shellDefeats=0;
  for(const shell of ents){
    if(!shell.alive || shell.type!=="nok" || shell.state!=="shellMoving") continue;
    const shellW=TILE*0.6, shellH=TILE*0.6;
    for(const target of ents){
      if(target===shell || !target.alive) continue;
      if(target.type!=="foe" && target.type!=="nok") continue;
      const targetW=TILE*0.7, targetH=TILE*0.7;
      const hitX=Math.abs(shell.x-target.x)<(shellW+targetW)*0.5;
      const hitY=shell.y>target.y-targetH && shell.y-shellH<target.y;
      if(hitX && hitY){ target.alive=false; shellDefeats++; }
    }
  }
  if(shellDefeats>0) addFloat("甲羅撃破！ x"+shellDefeats,AX+AW*0.5,AY+44,"#f8d800");
  ents=ents.filter(e=>e.alive);
}

/* ===== LOOP ===== */
function startOrRestart(){ reset(); state="play"; }
function win(){ state="win"; } function gameOver(reason){ state="lose"; loseReason=reason||"時間切れ"; }
let last=performance.now(),acc=0; const STEP=1/60;
function tick(now){ requestAnimationFrame(tick);
  let dt=(now-last)/1000; last=now; if(dt>0.1)dt=0.1; acc+=dt; anim+=dt;
  while(acc>=STEP){
    if(state==="play"){ sampleInput(); updateAction(STEP,frame); updateEntities(STEP); updatePuzzle(STEP,frame); updateStar(STEP);
      timer-=STEP; elapsed+=STEP; if(timer<=0){timer=0;gameOver("時間切れ");}
      flash=Math.max(0,flash-STEP);
      for(const fl of floats){ fl.y+=fl.vy*STEP; fl.life-=STEP*0.8; }
      floats=floats.filter(f=>f.life>0);
    } else sampleInput();
    acc-=STEP;
  }
  layout(); render();
}

  const pulse=0.5+0.5*Math.sin(anim*5+phase*0.17);
  block3d(x,y,s,"hsl(46 100% "+(52+Math.round(pulse*11))+"%)");
  g.save(); g.beginPath(); g.rect(x+1,y+1,s-2,s-2); g.clip();
  const sweep=((anim*0.9+phase*0.071)%1.6)-0.3;

  g.restore();
  const twinkle=0.5+0.5*Math.sin(anim*8+phase*1.7);

    const a=(twinkle-0.70)/0.30, sx=x+s*0.78, sy=y+s*0.20, r=s*(0.07+0.09*a);

function renderAction(){
  g.save(); g.beginPath(); g.rect(AX,AY,AW,AVH); g.clip();
  g.fillStyle=SKY; g.fillRect(AX,AY,AW,AVH);
  const cam=Math.max(0,Math.min(A.x-AW*0.35,L.len*TILE-AW)), offY=AY+(AVH-ACTION_WORLD_H);
  g.fillStyle="#fff";
  for(let i=0;i<6;i++){ const cxp=((i*380-cam*0.5)%(L.len*TILE))+AX, cyp=offY+60+((i%2)*30);
    for(const [dx,dw] of [[0,26],[20,34],[46,26]]) g.fillRect(cxp+dx,cyp,dw,18); g.fillRect(cxp+10,cyp-10,50,14); }
  g.translate(AX-cam,offY);
  for(let c=0;c<L.len;c++){ const gx=c*TILE;
    if(L.ground[c]!==null){ const gy=L.ground[c]*TILE;
      g.fillStyle=GRND; g.fillRect(gx,gy,TILE,ACTION_WORLD_H); g.fillStyle=GRND_D; g.fillRect(gx,gy,TILE,4);
      g.strokeStyle="rgba(0,0,0,.25)"; g.lineWidth=2;
      for(let ry=gy+TILE; ry<gy+ACTION_WORLD_H; ry+=TILE){ g.beginPath();g.moveTo(gx,ry);g.lineTo(gx+TILE,ry);g.stroke(); }
      g.beginPath();g.moveTo(gx+TILE/2,gy);g.lineTo(gx+TILE/2,gy+ACTION_WORLD_H);g.stroke();
    } else { g.fillStyle=SKY; g.fillRect(gx,GROUND*TILE,TILE,ACTION_WORLD_H); }
    if(L.ceil[c]!==null){ const cyb=L.ceil[c]*TILE;
      g.save(); g.beginPath(); g.rect(gx,-offY,TILE,cyb+offY); g.clip();
      for(let by=-offY-TILE; by<cyb; by+=TILE) brick(gx,by,TILE); g.restore(); }
    const it=L.item[c]; if(it){ const gy=(L.ground[c]??GROUND)*TILE;
      if(it==="cp"){ g.fillStyle="#fff"; g.fillRect(gx+TILE/2-1,gy-64,3,64); g.fillStyle="#38d038"; g.fillRect(gx+TILE/2+2,gy-64,16,12);}
      else if(it==="goal"){ g.fillStyle="#0a0"; g.fillRect(gx+TILE/2-2,gy-140,4,140);
        g.fillStyle="#f8d800"; g.beginPath(); g.moveTo(gx+TILE/2+2,gy-134); g.lineTo(gx+TILE/2+34,gy-124); g.lineTo(gx+TILE/2+2,gy-114); g.fill();
        g.fillStyle="#fff"; g.fillRect(gx+TILE/2-6,gy-8,12,8);} }
  }
  for(const b of L.blocks){ const q=blockRect(b);
    if(b.type==="brick") brickBlock(q.x,q.y,BLOCK); else qbox(q.x,q.y,BLOCK,b.used); }
  for(const e of ents){
    if(e.type==="mush") drawMush(e.x,e.y);
    else if(e.type==="coin") drawCoin(e.x,e.y,e.anim);
    else if(e.type==="star") drawStarItem(e.x,e.y,e.anim);
    else if(e.type==="foe") drawFoe(e.x,e.y,e.anim);
    else if(e.type==="nok"){ if(e.state==="walk") drawNokWalk(e.x,e.y,e.anim,e.dir); else drawShell(e.x,e.y,e.state==="shellMoving"); }
  }
  if(starTimer>0)drawStarAura(A.x,A.y,A.w,A.h);
  if(!(A.invuln>0 && Math.floor(A.invuln*12)%2===0)) drawHero(A.x-A.w/2,A.y-A.h,A.w,A.h,A.face,A.crouch);
  g.restore();
  g.fillStyle="#fff"; g.font="700 11px 'Courier New',monospace"; g.textAlign="left";
  g.fillText(isBig?("BIG"+(expandLevel>1?" x"+expandLevel:"")):"SMALL",AX+6,AY+14);
  g.strokeStyle="#000"; g.lineWidth=2; g.strokeRect(AX+1,AY,AW-2,AVH);
}
function renderRulePanel(x,y,w,h){
  const fs=Math.max(7,Math.min(11,Math.floor(w/12),Math.floor(h/25)));
  const gap=fs*1.38;
  const lines=[
    ["RULE","#fff"],
    ["固定 +1秒","#aaa"],
    ["1/2/3/4 LINE","#fff"],
    ["+5/+10/+15/+20秒","#f8d800"],
    ["COIN → 次がGOLD",GOLD],
    ["GOLD LINE ×2",GOLD],
    ["STAR 10秒","#fff176"],
    ["SIDE 接触で敵撃破","#5c94fc"],
    ["STACK 枠外OK","#f8d800"],
    ["終了後5秒で枠内へ","#f83c3c"],
    ["HIP 箱/レンガ破壊","#aaa"]
  ];
  if(starTimer>0)lines.unshift(["★ "+starTimer.toFixed(1)+"秒","#fff176"]);
  else if(starGraceTimer>0)lines.unshift(["RETURN "+starGraceTimer.toFixed(1)+"秒","#f83c3c"]);
  let yy=y;
  g.textAlign="left"; g.textBaseline="top"; g.font="700 "+fs+"px 'Courier New',monospace";
  for(const [text,color] of lines){ if(yy+fs>y+h)break; g.fillStyle=color; g.fillText(text,x,yy); yy+=gap; }
  g.textBaseline="alphabetic";
}
function renderPuzzle(){
  g.save(); g.beginPath(); g.rect(PX,PYY,PWD,PVH); g.clip();
  g.fillStyle="#101010"; g.fillRect(PX,PYY,PWD,PVH);
  const R=rows(), panelW=Math.max(82,Math.min(154,PWD*0.31)), gap=8;
  const boardAreaW=Math.max(PW*6,PWD-panelW-gap-8);
  const cell=Math.max(6,Math.floor(Math.min(boardAreaW/PW,PVH/R)));
  const boardW=PW*cell, boardH=R*cell;
  const ox=PX+4+Math.max(0,(boardAreaW-boardW)/2), oy=PYY+(PVH-boardH)/2;
  const panelX=ox+boardW+gap, panelRight=PX+PWD-4, actualPanelW=Math.max(60,panelRight-panelX);
  g.fillStyle="#000"; g.fillRect(ox-3,oy-3,boardW+6,boardH+6);
  const overflowRows=Math.min(starExtraRows,R);
  for(let r=0;r<R;r++)for(let c=0;c<PW;c++){ const x=ox+c*cell,y=oy+r*cell;
    g.fillStyle=r<overflowRows?(starTimer>0?"rgba(255,215,0,.18)":"rgba(248,60,60,.16)"):"#181818";
    g.fillRect(x,y,cell,cell); g.strokeStyle="#242424"; g.lineWidth=1; g.strokeRect(x+.5,y+.5,cell-1,cell-1);
    const v=P.grid[r][c]; if(v){ if(v===GOLD)drawGoldBlock(x,y,cell,r*PW+c); else block3d(x,y,cell,v); }
  }
  if(overflowRows>0){ const by=oy+overflowRows*cell;
    g.strokeStyle=starTimer>0?"#fff176":"#f83c3c"; g.lineWidth=3; g.beginPath(); g.moveTo(ox,by); g.lineTo(ox+boardW,by); g.stroke(); }
  if(P.cur){ for(const [c,r] of pieceCells(P.cur,P.cur.rot)){ if(r<0)continue;
    const x=ox+c*cell,y=oy+r*cell; if(P.cur.gold)drawGoldBlock(x,y,cell,700+c+r*PW); else block3d(x,y,cell,PCOL[P.cur.t]); } }
  if(expandLevel>0){ const added=Math.min(R,starExtraRows+expandLevel*CFG.expStep),by=oy+added*cell;
    g.strokeStyle="#38d038"; g.lineWidth=2; g.beginPath(); g.moveTo(ox,by); g.lineTo(ox+boardW,by); g.stroke(); }
  g.fillStyle="#fff"; g.font="700 11px 'Courier New',monospace"; g.textAlign="left"; g.fillText("NEXT",panelX,PYY+14);
  if(P.next){ const ps=Math.max(6,Math.min(14,cell*0.65));
    for(const [c,r] of SHAPES[P.next][0]){ const x=panelX+c*ps,y=PYY+20+r*ps;
      if(P.nextGold)drawGoldBlock(x,y,ps-1,900+c+r*4); else block3d(x,y,ps-1,PCOL[P.next]); } }
  renderRulePanel(panelX,PYY+70,actualPanelW,PVH-74);
  g.restore();
  g.strokeStyle="#000"; g.lineWidth=2; g.strokeRect(PX+1,PYY,PWD-2,PVH);
  g.textAlign="center";
  for(const fl of floats){ g.globalAlpha=Math.max(0,fl.life);
    g.fillStyle=fl.color; g.font="700 15px 'Courier New',monospace"; let fx=fl.x,fy=fl.y;
    if(fl.toTimer){ const t=1-fl.life; fx=fl.x+(W/2-fl.x)*t*t; fy=fl.y+((TBy+14)-fl.y)*t*t; }
    g.fillText(fl.text,fx,fy); }
  g.globalAlpha=1;
}
function renderEcho(){
  g.fillStyle="#000"; g.fillRect(ECx,ECy,ECw,ECh);
  const items=[{k:"←",on:frame.left,a:"もどる",p:"左"},{k:"→",on:frame.right,a:"すすむ",p:"右"},
    {k:"↑",on:frame.up,a:"ジャンプ/踏む",p:"回転"},{k:"↓",on:frame.down,a:"しゃがむ/ドロップ",p:"落下"}];
  const bw=ECw/4,cy=ECy+ECh/2;
  items.forEach((it,i)=>{ const x=ECx+i*bw;
    g.fillStyle=it.on?"#f8d800":"#333"; g.fillRect(x+8,cy-12,24,24);
    g.fillStyle=it.on?"#000":"#888"; g.font="700 15px 'Courier New',monospace"; g.textAlign="center"; g.fillText(it.k,x+20,cy+5);
    g.font="700 10px 'Courier New',monospace"; g.textAlign="left";
    g.fillStyle="#5c94fc"; g.fillText(it.a,x+37,cy-2); g.fillStyle="#f8d800"; g.fillText(it.p,x+37,cy+11); });
}
function renderTitle(){
  g.fillStyle="#000"; g.fillRect(0,0,W,H); const cx=W/2,u=H/100;
  g.fillStyle=SKY; g.fillRect(0,30*u,W,26*u);
  g.fillStyle="#000"; g.font="900 "+Math.round(15*u)+"px 'Courier New',monospace"; g.textAlign="center"; g.fillText("2 IN 1",cx,48*u);
  g.fillStyle="#fff"; g.fillText("2 IN 1",cx-2,46.5*u);
  g.fillStyle="#f8d800"; g.font="700 "+Math.round(2.6*u)+"px 'Courier New',monospace"; g.fillText("ONE D-PAD, TWO GAMES",cx,64*u);
  g.fillStyle="#aaa"; g.font="700 "+Math.round(2.1*u)+"px 'Courier New',monospace";
  g.fillText("横スクロール ＋ 落ち物 を 同じ十字で同時操作",cx,72*u);
  g.fillText(IS_TOUCH?"左＝移動 ／ 右＝ジャンプ・しゃがみ":"←→ 移動   ↑ ジャンプ/踏む/回転   ↓ しゃがみ/ドロップ/落下",cx,78*u);
  if(Math.floor(performance.now()/400)%2===0){ g.fillStyle="#fff"; g.font="700 "+Math.round(3*u)+"px 'Courier New',monospace";
    g.fillText(IS_TOUCH?"TAP TO START":"PUSH ANY KEY",cx,90*u); }
}
function renderEnd(){
  g.fillStyle="rgba(0,0,0,.82)"; g.fillRect(0,0,W,H); const cx=W/2,u=H/100; g.textAlign="center";
  if(state==="win"){ g.fillStyle="#f8d800"; g.font="900 "+Math.round(9*u)+"px 'Courier New',monospace"; g.fillText("CLEAR !",cx,42*u); }
  else { g.fillStyle="#f83c3c"; g.font="900 "+Math.round(7*u)+"px 'Courier New',monospace"; g.fillText("GAME OVER",cx,40*u);
    g.fillStyle="#ccc"; g.font="700 "+Math.round(2.6*u)+"px 'Courier New',monospace"; g.fillText(loseReason,cx,47*u); }
  g.fillStyle="#ccc"; g.font="700 "+Math.round(2.3*u)+"px 'Courier New',monospace";
  g.fillText("TIME "+elapsed.toFixed(1)+"  LINES "+ships+"  FALL "+deaths+"  HIT "+hits,cx,56*u);
  if(Math.floor(performance.now()/400)%2===0){ g.fillStyle="#fff"; g.font="700 "+Math.round(2.8*u)+"px 'Courier New',monospace";
    g.fillText(IS_TOUCH?"TAP TO RETRY":"PUSH ANY KEY",cx,66*u); }
}
fit(); layout(); requestAnimationFrame(tick);
</script>
