<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="robots" content="noindex,nofollow">
<title>2 IN 1 TOUCH PREVIEW</title>
<style>
  html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:monospace}
  #status{display:grid;place-items:center;width:100%;height:100%;text-align:center;padding:24px;box-sizing:border-box}
</style>
</head>
<body>
<div id="status">TOUCH PREVIEW LOADING...</div>
<script>
(async()=>{
  const source="https://raw.githubusercontent.com/0t4i5g0d-stack/2in1-preview/db8a2aacc6ccf73fe12bcc16741b2a0c84605c2a/index.html";
  try{
    const response=await fetch(source,{cache:"no-store"});
    if(!response.ok) throw new Error("HTTP "+response.status);
    let html=await response.text();
    const doubleTapGuard=`<script>
document.addEventListener("touchend",event=>{
  if(event.target instanceof Element && event.target.closest("#stage")) event.preventDefault();
},{capture:true,passive:false});
<\/script>`;
    html=html.replace("<title>2 IN 1</title>","<title>2 IN 1 TOUCH PREVIEW</title>");
    html=html.replace("</body>",doubleTapGuard+"\n</body>");
    document.open();
    document.write(html);
    document.close();
  }catch(error){
    document.getElementById("status").textContent="PREVIEW LOAD ERROR: "+error.message;
  }
})();
</script>
</body>
</html>
